<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Peaceful Palms | The Pinnacle of Mobile Alchemy — At Your Door</title>
    
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0C0B;
            overflow-x: hidden;
            color: #EDE9E2;
        }

        /* ——— NEXT-GEN VISUAL ATMOSPHERE with YOUR images ——— */
        .hero-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* YOUR main background image with dynamic zoom - perfect aspect ratio */
        .hero-bg-custom {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./images/home page.jpg') center center / cover no-repeat;
            filter: brightness(0.5) contrast(1.08) saturate(1.05);
            transform: scale(1);
            transition: transform 16s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            animation: slowCinematicZoom 24s infinite alternate ease-in-out;
        }

        @keyframes slowCinematicZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.06); }
        }

        /* Premium gradient overlay for depth & text readability */
        .luxury-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.7) 90%);
            z-index: 1;
        }

        /* WebGL particle layer (floating gold dust) */
        canvas#webglCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 2;
            mix-blend-mode: plus-lighter;
            pointer-events: none;
            opacity: 0.55;
        }

        /* main content — perfectly centered and proportioned */
        .universe-wrapper {
            position: relative;
            z-index: 15;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* Ultra-premium glass morphism — refined proportions */
        .crystalline-card {
            background: rgba(10, 14, 12, 0.65);
            backdrop-filter: blur(22px) saturate(180%);
            -webkit-backdrop-filter: blur(22px);
            border-radius: 56px;
            border: 1px solid rgba(210, 170, 110, 0.45);
            box-shadow: 0 35px 70px -15px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,245,0.08);
            padding: 2rem 1.8rem;
            max-width: 520px;
            width: 100%;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.5s;
            animation: floatReveal 0.9s cubic-bezier(0.12, 0.71, 0.33, 1);
        }

        @keyframes floatReveal {
            0% { opacity: 0; transform: translateY(30px) scale(0.97); backdrop-filter: blur(8px);}
            100% { opacity: 1; transform: translateY(0) scale(1);}
        }

        .crystalline-card:hover {
            border-color: rgba(210, 170, 110, 0.7);
            box-shadow: 0 45px 80px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(210, 170, 110, 0.2) inset;
        }

        /* emblem — YOUR LOGO preserved */
        .emblem-modern {
            width: 100px;
            height: 100px;
            margin: 0 auto 0.9rem auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emblem-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(210,170,110,0.15), rgba(210,170,110,0.02));
            border: 1px solid rgba(210,170,110,0.55);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2), 0 0 0 2px rgba(210,170,110,0.1);
            transition: transform 0.3s ease;
        }

        .logo-image-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            background: #1f2b24;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.5);
            border: 2px solid rgba(210,170,110,0.75);
        }

        .logo-image-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .emblem-modern:hover .emblem-ring {
            transform: scale(1.05);
            border-color: #E6C28F;
        }

        /* Typography — refined spacing */
        .insignia {
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 5px;
            font-weight: 500;
            color: #E1C699;
            text-align: center;
            margin-bottom: 0.6rem;
            word-spacing: 2px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #FFF9F0, #EBD7B0, #CFB07C);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.2rem;
            line-height: 1.2;
        }

        .sacred-divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #D6B17E, #EAD2A3, #D6B17E, transparent);
            margin: 0.8rem auto;
        }

        .description-luxury {
            font-size: 0.9rem;
            line-height: 1.55;
            font-weight: 400;
            text-align: center;
            color: rgba(248, 240, 228, 0.9);
            max-width: 360px;
            margin: 0 auto 1.4rem auto;
        }

        /* dynamic feature chips */
        .pill-cluster {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1.8rem;
        }

        .chip {
            background: rgba(30, 35, 32, 0.75);
            backdrop-filter: blur(5px);
            border-radius: 100px;
            padding: 0.4rem 1rem;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            color: #F0E2CF;
            border: 1px solid rgba(210, 170, 110, 0.35);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .chip i {
            font-size: 0.65rem;
            color: #E0BC84;
        }

        .chip:hover {
            background: rgba(210, 170, 110, 0.2);
            border-color: rgba(210, 170, 110, 0.7);
            transform: translateY(-2px);
        }

        /* primary CTA - perfectly centered, responsive */
        .cta-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .cta-leviosa {
            background: linear-gradient(105deg, #DAB07A, #B8865A);
            border: none;
            border-radius: 80px;
            padding: 0.9rem 2rem;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #131A15;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 8px 18px -6px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,235,190,0.3) inset;
            width: auto;
            min-width: 220px;
            position: relative;
            overflow: hidden;
        }

        .cta-leviosa:before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,245,200,0.4), transparent);
            transition: left 0.65s ease;
        }

        .cta-leviosa:hover:before {
            left: 100%;
        }

        .cta-leviosa:hover {
            transform: translateY(-3px);
            background: linear-gradient(105deg, #EAC48C, #CD9F6E);
            box-shadow: 0 16px 28px -10px black;
        }

        .cta-leviosa:active {
            transform: translateY(1px);
        }

        /* social minimal */
        .social-echo {
            margin-top: 1.6rem;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
        }

        .social-echo a {
            color: rgba(230, 210, 170, 0.55);
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .social-echo a:hover {
            color: #E8C68C;
            transform: translateY(-3px);
        }

        /* custom cursor (premium) */
        .custom-cursor {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(218, 176, 122, 0.7);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: 0.08s linear;
            transform: translate(-50%, -50%);
            backdrop-filter: invert(0.1);
            mix-blend-mode: difference;
        }

        /* LOADING OVERLAY — dark elegant background with your image but deep overlay for text contrast */
        .loading-cinematic {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #040706;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
            transition: opacity 1s cubic-bezier(0.2, 0.9, 0.4, 1);
            opacity: 0;
            visibility: hidden;
        }
        
        /* added semi-transparent overlay for text readability */
        .loading-cinematic::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.65) 0%, #020403 100%);
            z-index: 0;
        }
        
        /* background image applied but with dark overlay to make text pop */
        .loading-cinematic {
            background: url('./images/landing page.png') center center / cover no-repeat;
        }

        .loading-logo-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(210,170,110,0.6);
            box-shadow: 0 0 40px rgba(210,170,110,0.4);
            animation: gentlePulseLoading 1.6s infinite alternate;
            z-index: 2;
            backdrop-filter: blur(4px);
        }

        .loading-logo-wrapper img {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            filter: brightness(1.05);
        }

        @keyframes gentlePulseLoading {
            0% { transform: scale(0.94); opacity: 0.9; box-shadow: 0 0 0px #E1BC84; }
            100% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 30px #E1BC84; }
        }

        .loader-text {
            font-family: 'Space Grotesk', monospace;
            font-weight: 400;
            letter-spacing: 6px;
            font-size: 0.75rem;
            color: #F5E7CF;
            z-index: 2;
            text-shadow: 0 2px 8px rgba(0,0,0,0.7);
            background: rgba(0,0,0,0.3);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .loader-dots {
            display: flex;
            gap: 10px;
            z-index: 2;
        }
        .loader-dots span {
            width: 6px;
            height: 6px;
            background: #EAD2A3;
            border-radius: 50%;
            animation: fadeWave 1.2s infinite;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes fadeWave {
            0%, 100% { opacity: 0.3; transform: scale(0.7); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .loading-cinematic.active {
            opacity: 1;
            visibility: visible;
        }

        /* responsive — perfect mobile centering */
        @media (max-width: 550px) {
            .crystalline-card {
                padding: 1.6rem 1.3rem;
                border-radius: 44px;
                max-width: 94%;
            }
            h1 {
                font-size: 2.1rem;
            }
            .insignia {
                letter-spacing: 4px;
                font-size: 0.55rem;
            }
            .chip {
                padding: 0.3rem 0.85rem;
                font-size: 0.6rem;
            }
            .cta-leviosa {
                padding: 0.75rem 1.6rem;
                font-size: 0.72rem;
                letter-spacing: 2px;
                min-width: 190px;
            }
            .description-luxury {
                font-size: 0.82rem;
                margin-bottom: 1.2rem;
                padding: 0 0.2rem;
            }
            .custom-cursor {
                display: none;
            }
            .emblem-modern {
                width: 85px;
                height: 85px;
                margin-bottom: 0.6rem;
            }
            .logo-image-circle {
                width: 68px;
                height: 68px;
            }
            .pill-cluster {
                margin-bottom: 1.4rem;
                gap: 0.5rem;
            }
            .sacred-divider {
                margin: 0.6rem auto;
            }
        }

        /* very small devices */
        @media (max-width: 380px) {
            h1 {
                font-size: 1.85rem;
            }
            .crystalline-card {
                padding: 1.4rem 1rem;
            }
            .cta-leviosa {
                padding: 0.7rem 1.4rem;
                min-width: 170px;
            }
        }
    </style>
</head>
<body>

    <!-- Background with YOUR images preserved -->
    <div class="hero-canvas">
        <div class="hero-bg-custom"></div>
        <div class="luxury-overlay"></div>
        <canvas id="webglCanvas"></canvas>
    </div>

    <!-- custom cursor -->
    <div class="custom-cursor" id="dynamicCursor"></div>

    <!-- main experience — perfect centering -->
    <div class="universe-wrapper">
        <div class="crystalline-card">
            <div class="emblem-modern">
                <div class="emblem-ring"></div>
                <div class="logo-image-circle">
                    <img src="./images/logo.jpeg" alt="Peaceful Palms Emblem" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20fill%3D%22%23E8C48A%22%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2245%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22%232D4A3E%22%20font-size%3D%2238%22%20font-family%3D%22Arial%22%3E🌿%3C%2Ftext%3E%3C%2Fsvg%3E'">
                </div>
            </div>
            <div class="insignia">✦ Maison de Sérénité ✦</div>
            <h1>Peaceful Palms</h1>
            <div class="sacred-divider"></div>
            <p class="description-luxury">
                Where stillness meets opulence — a fully-customizable mobile spa concierge. 
                Rare essences, sculptural silence, absolute regenesis.
            </p>
            <div class="pill-cluster">
                <span class="chip"><i class="fas fa-dice-d6"></i> Bespoke Rituals</span>
                <span class="chip"><i class="fas fa-hand-sparkles"></i> Sacred Geometry</span>
                <span class="chip"><i class="fas fa-moon"></i> Lunar Alignments</span>
            </div>
            <div class="cta-wrapper">
                <button id="transcendBtn" class="cta-leviosa">
                    <span>Enter The Atrium</span>
                    <i class="fas fa-arrow-right-long"></i>
                </button>
            </div>
            <div class="social-echo">
                <a href="#" aria-label="instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" aria-label="x"><i class="fab fa-x-twitter"></i></a>
                <a href="#" aria-label="pinterest"><i class="fab fa-pinterest"></i></a>
            </div>
        </div>
    </div>

    <!-- loading overlay with YOUR logo — enhanced contrast layer for text readability -->
    <div id="cinematicLoader" class="loading-cinematic">
        <div class="loading-logo-wrapper">
            <img src="./images/logo.jpeg" alt="Peaceful Palms" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20fill%3D%22%23E8C48A%22%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2245%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22%232D4A3E%22%20font-size%3D%2238%22%20font-family%3D%22Arial%22%3E🌿%3C%2Ftext%3E%3C%2Fsvg%3E'">
        </div>
        <div class="loader-text">unveiling tranquility</div>
        <div class="loader-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script>
        (function() {
            // ------------------------------
            // 1. WEBGL PARTICLE LAYER (Gold dust floating elegantly)
            // ------------------------------
            const canvas = document.getElementById('webglCanvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                let width, height;
                let particles = [];
                const PARTICLE_COUNT = window.innerWidth < 768 ? 120 : 210;
                
                function initParticles() {
                    particles = [];
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        particles.push({
                            x: Math.random(),
                            y: Math.random(),
                            radius: Math.random() * 2.2 + 0.5,
                            alpha: Math.random() * 0.4 + 0.12,
                            speedX: (Math.random() - 0.5) * 0.0014,
                            speedY: (Math.random() - 0.5) * 0.001,
                            glow: Math.random() * 0.5 + 0.2,
                        });
                    }
                }
                
                function resizeCanvas() {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                }
                
                function draw() {
                    if (!ctx) return;
                    ctx.clearRect(0, 0, width, height);
                    
                    for (let p of particles) {
                        ctx.beginPath();
                        ctx.arc(p.x * width, p.y * height, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(220, 185, 110, ${p.alpha + Math.sin(Date.now() * 0.002 + p.x * 12) * 0.07})`;
                        ctx.fill();
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = `rgba(210, 160, 80, ${p.glow * 0.7})`;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        
                        p.x += p.speedX;
                        p.y += p.speedY;
                        if (p.x < 0) p.x = 1;
                        if (p.x > 1) p.x = 0;
                        if (p.y < 0) p.y = 1;
                        if (p.y > 1) p.y = 0;
                    }
                    requestAnimationFrame(draw);
                }
                
                window.addEventListener('resize', () => {
                    resizeCanvas();
                    initParticles();
                });
                resizeCanvas();
                initParticles();
                draw();
            }
            
            // 2. custom cursor elegant
            const cursor = document.getElementById('dynamicCursor');
            if (cursor && window.innerWidth > 768) {
                document.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });
                const interactive = document.querySelectorAll('button, .chip, .cta-leviosa, .social-echo a');
                interactive.forEach(el => {
                    el.addEventListener('mouseenter', () => {
                        cursor.style.transform = 'translate(-50%, -50%) scale(1.7)';
                        cursor.style.borderColor = '#EBC58C';
                        cursor.style.backgroundColor = 'rgba(235, 197, 140, 0.1)';
                    });
                    el.addEventListener('mouseleave', () => {
                        cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                        cursor.style.borderColor = 'rgba(218, 176, 122, 0.7)';
                        cursor.style.backgroundColor = 'transparent';
                    });
                });
            } else if (cursor) cursor.style.display = 'none';
            
            // 3. BUTTON + LOADING REDIRECT to gift.html
            const btn = document.getElementById('transcendBtn');
            const loaderOverlay = document.getElementById('cinematicLoader');
            let redirectActive = false;
            
            function startJourney() {
                if (redirectActive) return;
                redirectActive = true;
                btn.disabled = true;
                btn.style.opacity = '0.7';
                if (navigator.vibrate) navigator.vibrate(20);
                
                loaderOverlay.classList.add('active');
                
                const preloadGift = document.createElement('link');
                preloadGift.rel = 'preload';
                preloadGift.as = 'document';
                preloadGift.href = 'gift.html';
                document.head.appendChild(preloadGift);
                
                setTimeout(() => {
                    window.location.href = 'gift.html';
                }, 2000);
            }
            
            if (btn) {
                btn.addEventListener('click', startJourney);
            }
            
            // 4. subtle 3D tilt on card (only desktop)
            const card = document.querySelector('.crystalline-card');
            if (card && window.innerWidth > 700) {
                document.addEventListener('mousemove', (e) => {
                    const xAxis = (window.innerWidth / 2 - e.pageX) / 42;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 42;
                    card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg) translateY(0px)`;
                });
                document.addEventListener('mouseleave', () => {
                    card.style.transform = 'rotateY(0deg) rotateX(0deg)';
                });
            }
            
            // 5. Staggered animation for chips
            const chips = document.querySelectorAll('.chip');
            chips.forEach((chip, idx) => {
                chip.style.opacity = '0';
                chip.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    chip.style.transition = 'all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
                    chip.style.opacity = '1';
                    chip.style.transform = 'translateY(0px)';
                }, 100 + idx * 60);
            });
            
            // 6. Emblem ring pulse
            const emblemRingDiv = document.querySelector('.emblem-ring');
            if (emblemRingDiv) {
                setInterval(() => {
                    emblemRingDiv.style.boxShadow = '0 0 14px rgba(210,170,110,0.5), 0 0 0 2px rgba(210,170,110,0.2)';
                    setTimeout(() => {
                        emblemRingDiv.style.boxShadow = '0 8px 20px rgba(0,0,0,0.2), 0 0 0 2px rgba(210,170,110,0.1)';
                    }, 400);
                }, 3200);
            }
            
            // 7. Dynamic light overlay
            const overlayDiv = document.querySelector('.luxury-overlay');
            if (overlayDiv) {
                document.addEventListener('mousemove', (e) => {
                    const x = (e.clientX / window.innerWidth) * 100;
                    const y = (e.clientY / window.innerHeight) * 100;
                    overlayDiv.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 90%)`;
                });
            }
            
            // 8. Handle image fallbacks
            const allImages = document.querySelectorAll('img');
            allImages.forEach(img => {
                img.onerror = function(e) {
                    if (!this.dataset.fallbackSet) {
                        this.dataset.fallbackSet = 'true';
                        this.src = 'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20fill%3D%22%23E8C48A%22%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2245%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2267%22%20text-anchor%3D%22middle%22%20fill%3D%22%232D4A3E%22%20font-size%3D%2238%22%20font-family%3D%22Arial%22%3E🌿%3C%2Ftext%3E%3C%2Fsvg%3E';
                    }
                };
            });
            
            console.log('✨ Peaceful Palms — Refined, centered, cinematic experience ready');
        })();
    </script>
